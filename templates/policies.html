{% extends "base.html" %}
{% block title %}Policies{% endblock %}
{% block page_title %}Policies{% endblock %}

{% block content %}
<div class="card" style="padding:1.5rem;max-width:700px">
    {% if policies %}
    <div style="font-size:.95rem;line-height:1.7;white-space:pre-wrap;color:var(--text,#222)">{{ policies }}</div>
    {% else %}
    <div class="empty-state">
        <div class="empty-icon">📋</div>
        <p>No policies have been posted yet.</p>
    </div>
    {% endif %}
</div>
{% endblock %}
