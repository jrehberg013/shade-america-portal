{% extends "base.html" %}
{% block title %}Login{% endblock %}

{% block auth_content %}
<div class="auth-card">
    <div class="auth-logo">
        <img src="{{ url_for('static', filename='logo.png') }}" alt="Shade America" class="login-logo-img">
        <p style="margin-top:.5rem;color:#888;font-size:.85rem">Team Portal</p>
    </div>
    <form method="POST" action="{{ url_for('login') }}" class="auth-form">
        <div class="form-group">
            <label for="username">Username</label>
            <input type="text" id="username" name="username" required autofocus placeholder="Enter your username">
        </div>
        <div class="form-group">
            <label for="password">Password</label>
            <div style="position:relative">
                <input type="password" id="password" name="password" required placeholder="Enter your password" style="padding-right:2.5rem;width:100%">
                <button type="button" onclick="togglePw()" style="position:absolute;right:.6rem;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:#888;font-size:1.1rem" aria-label="Show password">
                    &#128065;
                </button>
            </div>
        </div>
        <button type="submit" class="btn btn-primary btn-full">Sign In</button>
    </form>
</div>
<script>
function togglePw(){
    var p=document.getElementById('password');
    p.type = p.type==='password' ? 'text' : 'password';
}
</script>
{% endblock %}
