{% extends "base.html" %}
{% block title %}New Project{% endblock %}
{% block page_title %}New Project{% endblock %}

{% block content %}
<div class="card card-narrow">
    <div class="card-header">
        <h2>Create New Project</h2>
    </div>
    <form method="POST" class="form-stack">
        <div class="form-group">
            <label for="name">Project Name <span class="required">*</span></label>
            <input type="text" id="name" name="name" required placeholder="e.g. Smith Residence Canopy">
        </div>
        <div class="form-row">
            <div class="form-group">
                <label for="client">Contact Name</label>
                <input type="text" id="client" name="client" placeholder="Customer name">
            </div>
            <div class="form-group">
                <label for="phone">Phone</label>
                <input type="text" id="phone" name="phone" placeholder="Contact number">
            </div>
        </div>
        <div class="form-group">
            <label for="street_address">Street Address</label>
            <input type="text" id="street_address" name="street_address" placeholder="e.g. 2590 Canvas Back Circle">
        </div>
        <div class="form-row">
            <div class="form-group" style="flex:2">
                <label for="city">City</label>
                <input type="text" id="city" name="city" placeholder="e.g. Auburndale">
            </div>
            <div class="form-group" style="flex:1">
                <label for="state">State</label>
                <select id="state" name="state">
                    <option value="">—</option>
                    <option value="FL" selected>FL</option>
                    <option value="GA">GA</option>
                    <option value="AL">AL</option>
                    <option value="SC">SC</option>
                    <option value="NC">NC</option>
                    <option value="TN">TN</option>
                    <option value="MS">MS</option>
                    <option value="LA">LA</option>
                    <option value="TX">TX</option>
                    <option value="VA">VA</option>
                    <option value="AK">AK</option><option value="AZ">AZ</option><option value="AR">AR</option>
                    <option value="CA">CA</option><option value="CO">CO</option><option value="CT">CT</option>
                    <option value="DE">DE</option><option value="HI">HI</option><option value="ID">ID</option>
                    <option value="IL">IL</option><option value="IN">IN</option><option value="IA">IA</option>
                    <option value="KS">KS</option><option value="KY">KY</option><option value="ME">ME</option>
                    <option value="MD">MD</option><option value="MA">MA</option><option value="MI">MI</option>
                    <option value="MN">MN</option><option value="MO">MO</option><option value="MT">MT</option>
                    <option value="NE">NE</option><option value="NV">NV</option><option value="NH">NH</option>
                    <option value="NJ">NJ</option><option value="NM">NM</option><option value="NY">NY</option>
                    <option value="ND">ND</option><option value="OH">OH</option><option value="OK">OK</option>
                    <option value="OR">OR</option><option value="PA">PA</option><option value="RI">RI</option>
                    <option value="SD">SD</option><option value="UT">UT</option><option value="VT">VT</option>
                    <option value="WA">WA</option><option value="WV">WV</option><option value="WI">WI</option>
                    <option value="WY">WY</option>
                </select>
            </div>
            <div class="form-group" style="flex:1">
                <label for="zip_code">Zip</label>
                <input type="text" id="zip_code" name="zip_code" placeholder="33823" maxlength="10">
            </div>
        </div>
        <div class="form-row">
            <div class="form-group">
                <label for="status">Status</label>
                <select id="status" name="status">
                    <option value="deposit_received" selected>Deposit Received</option>
                    <option value="design">Design / Drawings</option>
                    <option value="engineering">Engineering</option>
                    <option value="permitting">Permitting</option>
                    <option value="fabrication">Fabrication</option>
                    <option value="installation">Installation</option>
                    <option value="completed">Completed</option>
                </select>
            </div>
            <div class="form-group">
                <label for="estimate_total">Estimate Total ($)</label>
                <input type="number" id="estimate_total" name="estimate_total" step="0.01" min="0" placeholder="0.00">
            </div>
        </div>
        <div class="form-group">
            <label for="trello_url">Trello Card URL <span style="color:#6b7280;font-weight:400">(optional)</span></label>
            <input type="url" id="trello_url" name="trello_url" placeholder="https://trello.com/c/...">
        </div>
        <div class="form-group">
            <label for="trello_url">Trello Card URL <span style="color:#6b7280;font-weight:400">(optional)</span></label>
            <input type="url" id="trello_url" name="trello_url" placeholder="https://trello.com/c/...">
        </div>
        <div class="form-group">
            <label for="notes">Notes</label>
            <textarea id="notes" name="notes" rows="4" placeholder="Project notes, scope description..."></textarea>
        </div>
        <div class="form-actions">
            <a href="{{ url_for('jobs') }}" class="btn btn-outline">Cancel</a>
            <button type="submit" class="btn btn-primary">Create Project</button>
        </div>
    </form>
</div>
{% endblock %}
