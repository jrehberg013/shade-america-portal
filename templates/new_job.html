{% extends "base.html" %}
{% block title %}New Job{% endblock %}
{% block page_title %}New Job{% endblock %}

{% block content %}
<div class="card card-narrow">
    <div class="card-header">
        <h2>Create New Job</h2>
    </div>
    <form method="POST" class="form-stack">
        <div class="form-group">
            <label for="name">Job Name <span class="required">*</span></label>
            <input type="text" id="name" name="name" required placeholder="e.g. Smith Residence Canopy">
        </div>
        <div class="form-row">
            <div class="form-group">
                <label for="client">Client Name</label>
                <input type="text" id="client" name="client" placeholder="Customer name">
            </div>
            <div class="form-group">
                <label for="phone">Phone</label>
                <input type="text" id="phone" name="phone" placeholder="Contact number">
            </div>
        </div>
        <div class="form-group">
            <label for="location">Location / Address</label>
            <input type="text" id="location" name="location" placeholder="Job site address">
        </div>
        <div class="form-row">
            <div class="form-group">
                <label for="status">Status</label>
                <select id="status" name="status">
                    <option value="deposit_received" selected>Deposit Received</option>
                    <option value="design">Design / Drawings</option>
                    <option value="engineering">Engineering</option>
                    <option value="permitting">Permitting</option>
                    <option value="fabrication">Fabrication</option>
                    <option value="installation">Installation</option>
                    <option value="completed">Completed</option>
                </select>
            </div>
            <div class="form-group">
                <label for="estimate_total">Estimate Total ($)</label>
                <input type="number" id="estimate_total" name="estimate_total" step="0.01" min="0" placeholder="0.00">
            </div>
        </div>
        <div class="form-group">
            <label for="notes">Notes</label>
            <textarea id="notes" name="notes" rows="4" placeholder="Job notes, scope description..."></textarea>
        </div>
        <div class="form-actions">
            <a href="{{ url_for('jobs') }}" class="btn btn-outline">Cancel</a>
            <button type="submit" class="btn btn-primary">Create Job</button>
        </div>
    </form>
</div>
{% endblock %}
