{% extends "base.html" %}
{% block title %}Change Password{% endblock %}
{% block page_title %}Change Password{% endblock %}

{% block content %}
<div class="card card-narrow">
    <div class="card-header">
        <h2>Set New Password</h2>
        {% if must_change %}<p class="text-muted">Welcome\! Please set your password before continuing.</p>{% endif %}
    </div>
    <form method="POST" class="form-stack">
        <div class="form-group">
            <label for="new_password">New Password</label>
            <input type="password" id="new_password" name="new_password" required minlength="6" placeholder="At least 6 characters">
        </div>
        <div class="form-group">
            <label for="confirm_password">Confirm Password</label>
            <input type="password" id="confirm_password" name="confirm_password" required placeholder="Repeat password">
        </div>
        <div class="form-actions">
            <button type="submit" class="btn btn-primary">Update Password</button>
        </div>
    </form>
</div>
{% endblock %}
