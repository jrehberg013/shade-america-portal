{% extends "base.html" %}
{% block title %}Home{% endblock %}
{% block page_title %}Home{% endblock %}

{% block content %}
<div style="max-width:480px;margin:2rem auto;padding:0 1rem">

  <div style="text-align:center;margin-bottom:2rem">
    <div style="font-size:2rem;margin-bottom:.5rem">☀️</div>
    <div style="font-size:1.1rem;font-weight:600;color:var(--text)">
      Welcome, {{ current_user.name or current_user.username }}
    </div>
  </div>

  <div style="display:flex;flex-direction:column;gap:1rem">

    <a href="{{ url_for('field') }}" class="btn btn-primary" style="padding:1.1rem;font-size:1.05rem;text-align:center;border-radius:10px">
      💼 My Jobs
    </a>

    <a href="{{ url_for('forms_list') }}" class="btn btn-outline" style="padding:1.1rem;font-size:1.05rem;text-align:center;border-radius:10px">
      📋 Forms
    </a>

    <a href="{{ url_for('logout') }}" class="btn btn-outline" style="padding:1.1rem;font-size:1.05rem;text-align:center;border-radius:10px;color:var(--muted)">
      🚪 Logout
    </a>

  </div>
</div>
{% endblock %}
