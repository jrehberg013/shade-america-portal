{% extends "base.html" %}
{% block title %}{{ form.name }}{% endblock %}
{% block page_title %}{{ form.name }}{% endblock %}

{% block content %}
<div style="display:flex;flex-direction:column;height:calc(100vh - 120px)">

  <!-- Toolbar -->
  <div style="display:flex;align-items:center;justify-content:space-between;padding:.75rem 1rem;background:var(--card-bg);border-bottom:1px solid var(--border);flex-shrink:0">
    <a href="{{ url_for('forms_list') }}" class="btn btn-outline btn-sm" style="display:flex;align-items:center;gap:.4rem">
      ← Back to Forms
    </a>
    <div style="font-size:.85rem;color:var(--muted);text-align:center;flex:1;margin:0 1rem;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">
      {{ form.name }}
    </div>
    <button onclick="printForm()" class="btn btn-primary btn-sm" style="display:flex;align-items:center;gap:.4rem">
      🖨 Print
    </button>
  </div>

  <!-- PDF viewer -->
  <div style="flex:1;overflow:hidden">
    <iframe id="formFrame" src="{{ url_for('serve_form', form_id=form.id) }}"
            style="width:100%;height:100%;border:none"
            title="{{ form.name }}">
    </iframe>
  </div>

</div>

<script>
function printForm() {
    var iframe = document.getElementById('formFrame');
    if (iframe && iframe.contentWindow) {
        try {
            iframe.contentWindow.focus();
            iframe.contentWindow.print();
            return;
        } catch (e) {}
    }
    window.print();
}
</script>

<style>
  @media print {
    nav, .sidebar, .top-bar, header, .top-bar-right, .flash-messages,
    .mobile-menu-btn, .page-title { display: none !important; }
    main, .content, .main-wrapper { margin: 0 !important; padding: 0 !important; }
    iframe { width: 100% !important; height: 100vh !important; border: none !important; }
    button, a.btn { display: none !important; }
  }
</style>
{% endblock %}
