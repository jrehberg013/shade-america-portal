{% extends "base.html" %}
{% block title %}Edit announcement{% endblock %}
{% block page_title %}Edit announcement{% endblock %}

{% block content %}
<div class="card card-narrow">
  <div class="card-header">
    <h2>Edit {{ 'Field request' if ann.category == 'field_request' else 'News' }}</h2>
  </div>
  <form method="POST" class="form-stack">
    <div class="form-group">
      <label for="title">Title <span class="required">*</span></label>
      <input type="text" id="title" name="title" value="{{ ann.title }}" required maxlength="120">
    </div>
    <div class="form-group">
      <label for="body">Body</label>
      <textarea id="body" name="body" rows="4">{{ ann.body or '' }}</textarea>
    </div>
    {% if ann.category == 'field_request' %}
    <div class="form-group">
      <label style="display:flex;align-items:center;gap:.5rem;cursor:pointer">
        <input type="checkbox" name="is_urgent" value="1" {% if ann.is_urgent %}checked{% endif %}>
        <span>Mark as urgent</span>
      </label>
    </div>
    {% endif %}
    <div class="form-actions">
      <a href="{{ url_for('dashboard') }}" class="btn btn-outline">Cancel</a>
      <button type="submit" class="btn btn-primary">Save</button>
    </div>
  </form>
</div>
{% endblock %}
